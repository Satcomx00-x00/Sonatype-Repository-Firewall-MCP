# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Header prepended once at the top of the full CHANGELOG.md file.
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Tera template rendered once per release section.
# https://keats.github.io/tera/docs/
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif -%}
{{ commit.message | upper_first }} \
{% if commit.remote.username -%}by @{{ commit.remote.username }} {% endif -%}
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Satcomx00-x00/Sonatype-Repository-Firewall-MCP/commit/{{ commit.id }}))\
{% for link in commit.links %} ([{{ link.text }}]({{ link.href }})){% endfor %}
{% endfor %}
{% endfor %}\n
"""

# Strip leading/trailing whitespace from the rendered body.
trim = true

# Footer appended once at the bottom of the full CHANGELOG.md file.
footer = """
<!-- generated by git-cliff -->
"""

# ─── Remote (GitHub) ─────────────────────────────────────────────────────────
# Enables fetching contributor usernames and PR numbers via the GitHub API.
# GITHUB_TOKEN must be set; git-cliff will use it automatically.
[remote.github]
owner = "Satcomx00-x00"
repo  = "Sonatype-Repository-Firewall-MCP"

# ─── Git ─────────────────────────────────────────────────────────────────────
[git]
# Parse commits according to the Conventional Commits specification.
conventional_commits = true

# Drop commits that do not match the Conventional Commits format.
filter_unconventional = true

# Process each line of a multi-line commit body as its own commit entry.
split_commits = false

# Pre-process commit messages before parsing.
commit_preprocessors = [
  # Turn bare GitHub issue references (#123) into Markdown links.
  { pattern = '#(\d+)', replace = "[#${1}](https://github.com/Satcomx00-x00/Sonatype-Repository-Firewall-MCP/issues/${1})" },
]

# Map conventional commit types to changelog section headings.
# The <!-- N --> prefix is a sort key stripped by the `striptags` filter in the
# body template so that sections appear in the desired order.
commit_parsers = [
  { message = "^feat",              group = "<!-- 0 -->🚀 Features"       },
  { message = "^fix",               group = "<!-- 1 -->🐛 Bug Fixes"       },
  { message = "^perf",              group = "<!-- 2 -->⚡ Performance"     },
  { message = "^refactor",          group = "<!-- 3 -->♻️ Refactor"        },
  { message = "^doc",               group = "<!-- 4 -->📚 Documentation"   },
  { message = "^test",              group = "<!-- 5 -->🧪 Testing"         },
  { message = "^build",             group = "<!-- 6 -->🏗️ Build System"   },
  { message = "^ci",                group = "<!-- 7 -->👷 CI/CD"           },
  { message = "^chore\\(release\\)", skip = true                           },
  { message = "^chore\\(deps.*\\)", group = "<!-- 8 -->📦 Dependencies"   },
  { message = "^chore",             group = "<!-- 9 -->⚙️ Miscellaneous"  },
  { message = "^style",             group = "<!-- 10 -->🎨 Styling"        },
  { message = "^revert",            group = "<!-- 11 -->⏪ Reverts"        },
]

# Never hide breaking-change commits even if their type would normally be skipped.
protect_breaking_commits = true

# Drop commits that do not match any commit_parser entry.
filter_commits = false

# Glob pattern for recognising version tags.
tag_pattern = "v[0-9].*"

# Sort releases (tags) in topological order rather than purely by date.
topo_order = false

# Sort commits within each section newest-first.
sort_commits = "newest"

# Extract links from commit messages using these regex patterns.
link_parsers = [
  { pattern = "RFC(\\d+)", href = "https://tools.ietf.org/html/rfc$1", text = "RFC$1" },
]
