name: Release Please

on:
  push:
    branches:
      - main

# release-please needs write access to open and update release PRs,
# bump package.json and create the GitHub Release / tag.
# id-token: write is forwarded to the publish workflow for npm provenance.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Create Release PR / Tag
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Configuration is read from release-please-config.json.
          # The manifest (.release-please-manifest.json) tracks the
          # current version so release-please can compute the next bump.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # A PAT (stored as RELEASE_TOKEN) is required when the repository
          # setting "Allow GitHub Actions to create and approve pull requests"
          # is disabled, because the default GITHUB_TOKEN will be rejected.
          # Create a classic PAT with repo scope and save it as RELEASE_TOKEN.
          token: ${{ secrets.RELEASE_TOKEN }}

  # When release-please uses RELEASE_TOKEN (a PAT) it CAN trigger other
  # workflows, but we chain the publish workflow explicitly here to ensure
  # reliable publishing regardless of the token type used.
  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
