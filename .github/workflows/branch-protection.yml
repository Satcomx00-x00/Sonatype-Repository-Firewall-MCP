name: Setup Branch Protection

# Run this workflow once as an admin to lock the main branch.
# After it completes, direct pushes to main are blocked and every
# change must go through a pull request with passing CI checks.
#
# REQUIREMENTS
# ────────────
# This workflow uses the GitHub REST API endpoint that requires
# repository admin rights, which the automatic GITHUB_TOKEN does NOT
# provide.  Before running, create a fine-grained Personal Access Token
# (PAT) with the "Administration" repository permission (read & write)
# and store it as a repository secret named GH_ADMIN_TOKEN.
on:
  workflow_dispatch:

# The automatic GITHUB_TOKEN only needs read access here; the actual
# admin call uses the GH_ADMIN_TOKEN secret provided by the operator.
permissions:
  contents: read

jobs:
  protect:
    name: Configure main branch protection
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection rules
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          gh api \
            -X PUT \
            "repos/${{ github.repository }}/branches/main/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Commit Lint",
                "Lint & Build (18)",
                "Lint & Build (20)",
                "Lint & Build (22)"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_linear_history": true,
            "block_creations": false
          }
          JSON
          echo "✅ Branch protection applied to main."

      - name: Verify branch protection
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/branches/main/protection" \
            --jq '{
              required_status_checks: .required_status_checks.contexts,
              required_reviews: .required_pull_request_reviews.required_approving_review_count,
              enforce_admins: .enforce_admins.enabled,
              allow_force_pushes: .allow_force_pushes.enabled,
              allow_deletions: .allow_deletions.enabled,
              required_linear_history: .required_linear_history.enabled
            }'
