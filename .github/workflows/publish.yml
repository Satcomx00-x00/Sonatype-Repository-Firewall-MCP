name: Publish to npm

# Triggered automatically when a GitHub Release is published (which
# release-please does after merging a release PR).  A manual dispatch
# allows re-publishing a specific tag without creating a new release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write  # Required to update the GitHub Release body with generated notes
  id-token: write  # Required for npm provenance attestation

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    environment: npm-publish

    steps:
      - name: Resolve tag
        id: tag
        run: |
          # inputs.tag is set by both workflow_dispatch and workflow_call.
          # Fall back to the release event tag for the release trigger.
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "value=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so git-cliff can see all previous tags and
          # build accurate per-release notes for the current tag.
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Generate release notes with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --latest   : generate notes only for the most recent tag (this release)
          # --strip all: omit the global header/footer so the output is pure body
          # --verbose  : emit progress info in the run log
          args: --verbose --latest --strip all
        env:
          # Write release notes to a temp file consumed by the next step.
          OUTPUT: /tmp/release-notes.md
          # Allows git-cliff to resolve contributor usernames and PR numbers.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach release notes to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          if [ -s /tmp/release-notes.md ]; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
            echo "Release notes updated for $TAG"
          else
            echo "git-cliff produced no output — keeping original release notes."
          fi

      - name: Publish to npm (public registry)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
