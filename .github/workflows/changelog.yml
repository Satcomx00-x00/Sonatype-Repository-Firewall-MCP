name: Changelog

on:
  push:
    branches:
      - main
      - master

# Write permission is required to commit CHANGELOG.md back to the repository.
permissions:
  contents: write

jobs:
  changelog:
    name: Generate & Commit Changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so git-cliff can walk all tags and commits.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; the `contents: write` permission above
          # allows the bot to push the changelog commit back to the branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CHANGELOG.md
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --verbose: emit progress info so the run log is self-explanatory.
          args: --verbose
        env:
          # Destination file for the full changelog.
          OUTPUT: CHANGELOG.md
          # Lets git-cliff resolve contributor usernames and PR numbers via the
          # GitHub API and embed them in the generated markdown.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          # Only commit when the file actually changed.
          if git diff --staged --quiet; then
            echo "CHANGELOG.md is already up to date — nothing to commit."
          else
            git commit -m "chore(changelog): update CHANGELOG.md [skip ci]"
            git push
          fi
